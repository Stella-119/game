<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物森林 - 登录/注册</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🌲 动物森林 🌲</h1>
                <p>欢迎来到动物森林消消乐</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            
            <div class="tab-content" id="login">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="auth-btn">登录</button>
                </form>
            </div>
            
            <div class="tab-content" id="register" style="display: none;">
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">用户名</label>
                        <input type="text" id="reg-username" required minlength="3" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">密码</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">确认密码</label>
                        <input type="password" id="reg-confirm-password" required>
                    </div>
                    <div class="form-group">
                        <label>选择头像</label>
                        <div class="avatar-selector" id="avatar-selector">
                        </div>
                    </div>
                    <button type="submit" class="auth-btn">注册</button>
                </form>
            </div>
            
            <div class="auth-message" id="auth-message"></div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
